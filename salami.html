<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salami Me</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #e2136e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    width: 90%;
    max-width: 340px;
    background: white;
    border-radius: 18px;
    padding: 22px 18px;
    text-align: center;
    box-shadow: 0 12px 30px rgba(0,0,0,0.18);
  }

  .logo {
    font-size: 22px;
    font-weight: 600;
    color: #e2136e;
    margin-bottom: 8px;
  }

  h1 {
    margin: 6px 0;
    font-size: 20px;
    color: #222;
  }

  p {
    color: #777;
    font-size: 13px;
    margin-bottom: 20px;
  }

  .number {
    background: #f7f7f7;
    padding: 10px;
    border-radius: 10px;
    font-size: 15px;
    margin-bottom: 15px;
    letter-spacing: 0.5px;
  }

  button {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    background: #e2136e;
    color: white;
    cursor: pointer;
  }

  button:active {
    transform: scale(0.97);
  }

  #msg {
    margin-top: 10px;
    font-size: 13px;
    color: #e2136e;
  }

  .home {
    margin-top: 18px;
    display: inline-block;
    font-size: 12px;
    color: #999;
    text-decoration: none;
  }

  .home:hover {
    color: #e2136e;
  }
</style>
</head>

<body>

<div class="container">

  <h1>ঈদ মোবারক! ঈদ মোবারক!</h1>
  <h4>ঈদের চাঁদ আকাশে, সালামি দিন bKash এ!</h4>

  <div class="number">01854361640</div>

  <button onclick="copyNumber()"> Copy Number </button>

  <div id="msg"></div>

  <a class="home" href="/"> Shahriar Hasan Emon </a>
</div>

<script>
function copyNumber() {
  navigator.clipboard.writeText("017XXXXXXXX");
  document.getElementById("msg").innerText = "Copied!";
}
</script>

</body>
</html>
